      /* Efeito de destaque RGB (borda animada passando pelas laterais) */
      .link.rgb {
        position: relative;
        z-index: 0;
        border-color: transparent;
      }

      .link.rgb::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 2px;
        background: linear-gradient(
          90deg,
          #ff0040,
          #ff8a00,
          #ffe600,
          #14ff72,
          #00e5ff,
          #2a6bff,
          #b14bff,
          #ff0040
        );
        background-size: 300% 100%;
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        mask-composite: exclude;
        animation: rgbFlow 4s linear infinite;
        pointer-events: none;
      }

      .link.rgb::after {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          #ff0040,
          #ff8a00,
          #ffe600,
          #14ff72,
          #00e5ff,
          #2a6bff,
          #b14bff,
          #ff0040
        );
        background-size: 300% 100%;
        filter: blur(11px);
        opacity: 0.5;
        animation: rgbFlow 4s linear infinite;
        pointer-events: none;
        z-index: -1;
      }

      @keyframes rgbFlow {
        to {
          background-position: 300% 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .link.rgb::before,
        .link.rgb::after {
          animation: none;

      const CACHE_KEY = "pkmlinks_cfg";

      function loadCachedConfig() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return null;
          const { config, ts } = JSON.parse(raw);
          if (Date.now() - ts > CACHE_TTL) return null;
          return config;
        } catch { return null; }

      function saveCachedConfig(config) {
        try { localStorage.setItem(CACHE_KEY, JSON.stringify({ config, ts: Date.now() })); } catch {}

      async function loadPublicConfigFromServer() {
        const { ok, data } = await fetchJson(`${API_BASE}/public`, { method: "GET" });
        if (!ok || !data || typeof data !== "object") throw new Error("Falha ao carregar dados");
        appConfig = normalizeConfig(data.config);
        configLoaded = true;
        saveCachedConfig(data.config);
      }

      function ensureConfigLoaded() {
        if (configLoaded) return Promise.resolve();

        const cached = loadCachedConfig();
        if (cached) {
          appConfig = normalizeConfig(cached);
          configLoaded = true;
          loadPublicConfigFromServer()
            .then(() => renderApp())
            .catch(() => {});
          return Promise.resolve();
        }

        if (configLoadPromise) return configLoadPromise;
        configLoadPromise = loadPublicConfigFromServer()
          .catch(() => {
            configLoaded = true;
            appConfig = normalizeConfig(defaultConfig);
          })
          .finally(() => {
            renderApp();
          });
        return configLoadPromise;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function readRawFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("Falha ao ler arquivo"));
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("Falha ao processar imagem"));
          img.src = src;
        });
      }

      async function readFileAsDataUrl(file) {
        const raw = await readRawFileAsDataUrl(file);
        const type = String(file && file.type ? file.type : "");
        if (!type.startsWith("image/")) return raw;

        try {
          const img = await loadImage(raw);
          const maxBytes = 350_000;
          const attempts = [
            { maxDim: 512, type: "image/webp", quality: 0.85 },
            { maxDim: 512, type: "image/jpeg", quality: 0.82 },
            { maxDim: 384, type: "image/webp", quality: 0.82 },
            { maxDim: 384, type: "image/jpeg", quality: 0.78 },
          ];

          for (const attempt of attempts) {
            const maxDim = attempt.maxDim;
            const iw = Number(img.naturalWidth || img.width || 0);
            const ih = Number(img.naturalHeight || img.height || 0);
            if (!iw || !ih) continue;

            const scale = Math.min(1, maxDim / Math.max(iw, ih));
            const w = Math.max(1, Math.round(iw * scale));
            const h = Math.max(1, Math.round(ih * scale));

            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            if (!ctx) continue;
            ctx.drawImage(img, 0, 0, w, h);

            let out = canvas.toDataURL(attempt.type, attempt.quality);
            if (!out || typeof out !== "string") continue;
            if (out.length <= maxBytes) return out;

            let quality = attempt.quality;
            while (out.length > maxBytes && quality > 0.5) {
              quality = Number((quality - 0.08).toFixed(2));
              out = canvas.toDataURL(attempt.type, quality);
            }
            if (out.length <= maxBytes) return out;
          }

          return raw;
        } catch {
          return raw;
        }
      }

      function isHexColor(value) {
        return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || "").trim());
      }

      function toHexColor(value) {
        const v = String(value || "").trim();
        if (isHexColor(v)) return v;
        const map = {
          pink: "#ff4d6d",
          purple: "#9333ea",
          blue: "#06b6d4",
          green: "#4ade80",
          orange: "#fb923c",
          yellow: "#f59e0b",
        };
        return map[v] || "#9333ea";
      }

      // Identifica o card "Grupo de promoção" (por título/subtítulo ou link do WhatsApp)

      function isPromoLink(link) {
        const text = `${link && link.title ? link.title : ""} ${link && link.subtitle ? link.subtitle : ""}`.toLowerCase();
        const href = (link && link.href ? link.href : "").toLowerCase();
        return /promo|grupo/.test(text) || /wa\.me|whatsapp|chat\.whatsapp/.test(href);

      function renderLinkCard(link, withRgb) {
        const href = link.href && link.href.trim() ? link.href.trim() : "#";

        const iconImageUrl =
          typeof link.iconImageUrl === "string" && link.iconImageUrl.trim()
            ? link.iconImageUrl.trim()
            : "";
        const color = link.color && link.color.trim() ? link.color.trim() : "purple";
        const title = link.title && link.title.trim() ? link.title.trim() : "Link";
        const subtitle = link.subtitle && link.subtitle.trim() ? link.subtitle.trim() : "";
        const iconHtml = iconImageUrl
          ? `<img src="${escapeHtml(iconImageUrl)}" alt="" />`
          : escapeHtml(icon);
        const iconClass = isHexColor(color) ? "" : ` ${escapeHtml(color)}`;
        const iconStyle = isHexColor(color) ? ` style="background: ${escapeHtml(color)};"` : "";
        const linkClass = withRgb ? "link rgb" : "link";

        return `
          <a href="${escapeHtml(href)}" class="${linkClass}" target="${href.startsWith("http") ? "_blank" : "_self"}" rel="noreferrer">
            <div class="left">
              <div class="icon${iconClass}"${iconStyle}>${iconHtml}</div>

        withIndex.sort((a, b) => {
          const ao = Number(a.l.order) || 0;
          const bo = Number(b.l.order) || 0;
          if (ao !== bo) return ao - bo;
          return a.index - b.index;
        });
        links.length = 0;
        withIndex.forEach((x) => links.push(x.l));

      function attachAdminGateHandlers() {
        const form = document.getElementById("loginForm");
        const password = document.getElementById("password");
        const error = document.getElementById("loginError");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          lastLoginError = "";
          error.style.display = "none";
          const value = password.value || "";

          const btn = form.querySelector("button[type='submit']");
          if (btn instanceof HTMLButtonElement) btn.disabled = true;

          try {
            const { ok, data } = await fetchJson(`${API_BASE}/admin/verify`, {
              method: "POST",
              body: JSON.stringify({ username: ADMIN_USERNAME, password: value }),
            });

            if (!ok || !data || data.ok !== true) {
              lastLoginError = "Senha inválida.";
              error.style.display = "block";
              password.value = "";
              password.focus();
              return;
            }

            adminPassword = value;
            const loaded = await fetchJson(`${API_BASE}/admin/get`, {
              method: "POST",
              body: JSON.stringify({ username: ADMIN_USERNAME, password: adminPassword }),
            });
            if (loaded.ok && loaded.data && typeof loaded.data === "object") {
              appConfig = normalizeConfig(loaded.data.config);
              configLoaded = true;
            }
            renderApp();
          } catch {
            lastLoginError = "Falha ao conectar no Supabase.";
            error.style.display = "block";
          } finally {
            if (btn instanceof HTMLButtonElement) btn.disabled = false;
          }
        });
      }

        }

        const profileName = document.getElementById("profileName");
        if (profileName instanceof HTMLInputElement) {
          next.profile.name = profileName.value.trim();
        }

        const profileRole = document.getElementById("profileRole");
        if (profileRole instanceof HTMLInputElement) {
          next.profile.role = profileRole.value.trim();
        }

        const profileBio = document.getElementById("profileBio");
        if (profileBio instanceof HTMLTextAreaElement) {
          next.profile.bio = profileBio.value.trim();
        }

        const footerText = document.getElementById("footerText");
        if (footerText instanceof HTMLInputElement) {
          next.footerText = footerText.value.trim();
        }

        const fields = document.querySelectorAll("[data-field][data-index]");
        fields.forEach((el) => {
          const idx = Number(el.getAttribute("data-index"));
          const field = el.getAttribute("data-field");
          if (!Number.isFinite(idx) || idx < 0 || idx >= next.links.length) return;
          if (!field) return;
          next.links[idx][field] = el.value;
        });

        const seriesFields = document.querySelectorAll("[data-field][data-serie-idx]");
        seriesFields.forEach((el) => {
          const sIdx = Number(el.getAttribute("data-serie-idx"));
          const vIdx = el.hasAttribute("data-video-idx") ? Number(el.getAttribute("data-video-idx")) : null;
          const field = el.getAttribute("data-field");

          if (!Number.isFinite(sIdx) || sIdx < 0 || sIdx >= next.series.length) return;

          if (vIdx !== null) {
            if (!next.series[sIdx].videos[vIdx]) return;
            if (field === "v-title") next.series[sIdx].videos[vIdx].title = el.value;
            if (field === "v-duration") next.series[sIdx].videos[vIdx].duration = el.value;
            if (field === "v-url") next.series[sIdx].videos[vIdx].url = el.value;
            if (field === "v-thumbUrl") next.series[sIdx].videos[vIdx].thumbUrl = el.value;
          } else {
            if (field === "title") next.series[sIdx].title = el.value;
            if (field === "icon") next.series[sIdx].icon = el.value;
            if (field === "description") next.series[sIdx].description = el.value;
            if (field === "coverUrl") next.series[sIdx].coverUrl = el.value;
          }
        });

        return normalizeConfig(next);
      }

      function updatePreview(config) {
        const preview = document.getElementById("preview");
        if (!preview) return;
        if (adminActiveTab === "series") {
          preview.innerHTML = renderSeries(config);
        } else {
          preview.innerHTML = renderPublic(config);
        }
      }

      function attachAdminEditorHandlers(config) {
        let state = normalizeConfig(config);
        const setupListener = (id, event, handler) => {
          const el = document.getElementById(id);
          if (el) el.addEventListener(event, handler);
        };

        updatePreview(state);
        adminSeriesPreviewSelectedId = null;
        window.__adminSeriesPreviewSelect = (id) => {
          adminSeriesPreviewSelectedId = String(id || "");
          updatePreview(state);
        };
        window.__adminSeriesPreviewBack = () => {
          adminSeriesPreviewSelectedId = null;
          updatePreview(state);
        };

        const previewRefresh = () => {
          state = getEditorStateFromDOM(state);
          appConfig = state; // Sincroniza com o estado global para não perder dados ao renderApp()
          updatePreview(state);
        };

        // Handlers de Navegação
        setupListener("backToMainBtn", "click", () => {
          adminActiveTab = "main";
          renderApp();
        });

        // Handlers do Linktree
        setupListener("backgroundVideoUrl", "input", previewRefresh);
        setupListener("backgroundVideoFile", "change", async (e) => {
          const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
          if (!file) return;
          try {
            if (!adminPassword) throw new Error("Sem senha");
            const { ok, status, data } = await uploadBackgroundVideoFromFile(file);
            if (!ok || !data || typeof data !== "object" || typeof data.url !== "string" || !data.url) {
              const message = data?.error || `Falha ao subir vídeo. (status ${status})`;
              throw new Error(message);
            }
            state = getEditorStateFromDOM(state);
            state.backgroundVideoUrl = data.url;
            appConfig = state;
            configLoaded = true;
            renderApp();
          } catch (err) {
            window.alert(err instanceof Error ? err.message : "Falha ao subir vídeo.");
          } finally {
            e.target.value = "";
          }
        });

        setupListener("profileImageUrl", "input", previewRefresh);
        setupListener("profileImageFile", "change", async (e) => {
          const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
          if (!file) return;
          const dataUrl = await readFileAsDataUrl(file);
          state = getEditorStateFromDOM(state);
          state.profile.imageUrl = dataUrl;
          appConfig = state;
          configLoaded = true;
          renderApp();
          e.target.value = "";
        });

        setupListener("profileName", "input", previewRefresh);
        setupListener("profileRole", "input", previewRefresh);
        setupListener("profileBio", "input", previewRefresh);
        setupListener("footerText", "input", previewRefresh);

        const itemsEl = document.getElementById("items");
        if (itemsEl) {
          itemsEl.addEventListener("input", previewRefresh);
          itemsEl.addEventListener("change", (e) => {
            const target = e.target;
            if (!(target instanceof HTMLInputElement)) return;
            if (target.getAttribute("data-field") === "order") {
              state = getEditorStateFromDOM(state);
              sortLinksInPlace(state.links);
              renumberOrders(state.links);
              appConfig = state;
              configLoaded = true;
              renderApp();
            } else if (target.type === "file" && target.getAttribute("data-action") === "uploadIcon") {
              const idx = Number(target.getAttribute("data-index"));
              if (!Number.isFinite(idx)) return;
              const file = target.files && target.files[0] ? target.files[0] : null;
              if (!file) return;
              readFileAsDataUrl(file).then(dataUrl => {
                state = getEditorStateFromDOM(state);
                if (state.links[idx]) {
                  state.links[idx].iconImageUrl = dataUrl;
                  appConfig = state;
                  configLoaded = true;
                  renderApp();
                }
              });
            }
          });
          itemsEl.addEventListener("click", (e) => {
            const target = e.target;
            if (!(target instanceof HTMLElement)) return;
            const action = target.getAttribute("data-action");
            if (action === "removeLink") {
              const idx = Number(target.getAttribute("data-index"));
              if (!Number.isFinite(idx)) return;
              state = getEditorStateFromDOM(state);
              state.links.splice(idx, 1);
              appConfig = state;
              configLoaded = true;
              renderApp();
            }
          });
        }

        setupListener("addLinkBtn", "click", () => {
          state = getEditorStateFromDOM(state);
          const maxOrder = state.links.reduce((acc, l) => Math.max(acc, Number(l.order) || 0), 0);
          const next = createEmptyLink();
          next.order = maxOrder + 1;
          state.links.push(next);
          sortLinksInPlace(state.links);
          appConfig = state;
          configLoaded = true;
          renderApp();
        });

        // Handlers de Séries
        const seriesList = document.getElementById("admin-series-list");
        if (seriesList) {
          const renderAdminSeries = () => {
            seriesList.innerHTML = state.series
              .map((s, sIdx) => `
                <div class="item" style="margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 8px;">
                  <div class="row">
                    <div class="field">
                      <label>Título da Série</label>
                      <input type="text" data-serie-idx="${sIdx}" data-field="title" value="${escapeHtml(s.title)}" />
                    </div>
                    <div class="field">
                      <label>Ícone</label>
                      <input type="text" data-serie-idx="${sIdx}" data-field="icon" value="${escapeHtml(s.icon)}" />
                    </div>
                  </div>
                  <div class="field">
                    <label>Descrição</label>
                    <input type="text" data-serie-idx="${sIdx}" data-field="description" value="${escapeHtml(s.description)}" />
                  </div>
                  <div class="field">
                    <label>Capa da Série (URL)</label>
                    <input type="url" data-serie-idx="${sIdx}" data-field="coverUrl" value="${escapeHtml(s.coverUrl)}" />
                    <div class="file-row" style="margin-top: 8px;">
                      <input class="file-input" type="file" id="serie-cover-${sIdx}" accept="image/*" data-action="uploadSerieCover" data-serie-idx="${sIdx}" />
                      <label class="btn" for="serie-cover-${sIdx}">Subir Capa</label>
                    </div>
                  </div>
                  <div style="margin-top: 15px;">
                    <label>Vídeos desta Série</label>
                    <div id="admin-videos-${sIdx}">
                      ${s.videos.map((v, vIdx) => `
                        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; margin-top: 10px;">
                          <div class="row">
                            <div class="field">
                              <label>Título do Vídeo</label>
                              <input type="text" data-serie-idx="${sIdx}" data-video-idx="${vIdx}" data-field="v-title" value="${escapeHtml(v.title)}" />
                            </div>
                            <div class="field">
                              <label>Duração</label>
                              <input type="text" data-serie-idx="${sIdx}" data-video-idx="${vIdx}" data-field="v-duration" value="${escapeHtml(v.duration)}" />
                            </div>
                          </div>
                          <div class="field">
                            <label>URL do Vídeo</label>
                            <input type="url" data-serie-idx="${sIdx}" data-video-idx="${vIdx}" data-field="v-url" value="${escapeHtml(v.url)}" />
                          </div>
                          <div class="field">
                            <label>Thumbnail do Vídeo (URL)</label>
                            <input type="url" data-serie-idx="${sIdx}" data-video-idx="${vIdx}" data-field="v-thumbUrl" value="${escapeHtml(v.thumbUrl)}" />
                            <div class="file-row" style="margin-top: 8px;">
                              <input class="file-input" type="file" id="video-thumb-${sIdx}-${vIdx}" accept="image/*" data-action="uploadVideoThumb" data-serie-idx="${sIdx}" data-video-idx="${vIdx}" />
                              <label class="btn" for="video-thumb-${sIdx}-${vIdx}">Subir Thumb</label>
                            </div>
                          </div>
                          <button class="btn" style="background: #ef4444; margin-top: 10px;" data-action="removeVideo" data-serie-idx="${sIdx}" data-video-idx="${vIdx}">Remover Vídeo</button>
                        </div>
                      `).join("")}
                    </div>
                    <button class="btn" style="margin-top: 10px; width: 100%;" data-action="addVideo" data-serie-idx="${sIdx}">+ Adicionar Vídeo</button>
                  </div>
                  <button class="btn" style="background: #ef4444; margin-top: 20px; width: 100%;" data-action="removeSerie" data-serie-idx="${sIdx}">Remover Série Completa</button>
                </div>
              `).join("");
          };

          renderAdminSeries();

          seriesList.addEventListener("input", (e) => {
            const target = e.target;
            if (!(target instanceof HTMLInputElement)) return;
            const sIdx = Number(target.getAttribute("data-serie-idx"));
            const vIdx = target.hasAttribute("data-video-idx") ? Number(target.getAttribute("data-video-idx")) : null;
            const field = target.getAttribute("data-field");

            if (vIdx !== null) {
              if (field === "v-title") state.series[sIdx].videos[vIdx].title = target.value;
              if (field === "v-duration") state.series[sIdx].videos[vIdx].duration = target.value;
              if (field === "v-url") state.series[sIdx].videos[vIdx].url = target.value;
              if (field === "v-thumbUrl") state.series[sIdx].videos[vIdx].thumbUrl = target.value;
            } else {
              if (field === "title") state.series[sIdx].title = target.value;
              if (field === "icon") state.series[sIdx].icon = target.value;
              if (field === "description") state.series[sIdx].description = target.value;
              if (field === "coverUrl") state.series[sIdx].coverUrl = target.value;
            }
            previewRefresh();
          });

          seriesList.addEventListener("change", async (e) => {
            const target = e.target;
            if (!(target instanceof HTMLInputElement) || target.type !== "file") return;
            const action = target.getAttribute("data-action");
            const sIdx = Number(target.getAttribute("data-serie-idx"));
            const vIdx = target.hasAttribute("data-video-idx") ? Number(target.getAttribute("data-video-idx")) : null;
            const file = target.files && target.files[0] ? target.files[0] : null;
            if (!file) return;

            const dataUrl = await readFileAsDataUrl(file);
            if (action === "uploadSerieCover") {
              state.series[sIdx].coverUrl = dataUrl;
            } else if (action === "uploadVideoThumb") {
              state.series[sIdx].videos[vIdx].thumbUrl = dataUrl;
            }
            appConfig = state;
            configLoaded = true;
            renderApp();
          });

          seriesList.addEventListener("click", (e) => {
            const target = e.target;
            if (!(target instanceof HTMLElement)) return;
            const action = target.getAttribute("data-action");
            const sIdx = Number(target.getAttribute("data-serie-idx"));
            const vIdx = target.hasAttribute("data-video-idx") ? Number(target.getAttribute("data-video-idx")) : null;

            if (action === "addVideo") {
              state.series[sIdx].videos.push({ title: "Novo Vídeo", duration: "0:00", url: "https://", thumbUrl: "" });
            } else if (action === "removeVideo") {
              state.series[sIdx].videos.splice(vIdx, 1);
            } else if (action === "removeSerie") {
              if (!confirm("Tem certeza que deseja remover esta série?")) return;
              state.series.splice(sIdx, 1);
            } else return;

            appConfig = state;
            configLoaded = true;
            renderApp();
          });
        }

        setupListener("addSerieBtn", "click", () => {
          state.series.push({
            id: String(Date.now()),
            title: "Nova Série",
            description: "Descrição da série",
            icon: "📺",
            coverUrl: "",
            videos: [],
          });
          appConfig = state;
          configLoaded = true;
          renderApp();
        });

        // Handlers Gerais
        setupListener("saveBtn", "click", async () => {
          state = getEditorStateFromDOM(state);
          appConfig = state;
          updatePreview(state);
          const btn = document.getElementById("saveBtn");
          if (btn instanceof HTMLButtonElement) {
            btn.disabled = true;
            btn.textContent = "Salvando...";
          }
          try {
            if (!adminPassword) throw new Error("Sem senha");
            const { ok, status, data } = await fetchJson(`${API_BASE}/admin/save`, {
              method: "POST",
              body: JSON.stringify({ username: ADMIN_USERNAME, password: adminPassword, config: state }),
            });
            if (!ok || !data || data.ok !== true) {
              throw new Error(data?.error || `Falha ao salvar no Supabase. (status ${status})`);
            }
            window.alert("Configurações salvas com sucesso!");
            renderApp();
          } catch (err) {
            window.alert(err instanceof Error ? err.message : "Falha ao salvar no Supabase.");
          } finally {
            if (btn instanceof HTMLButtonElement) {
              btn.disabled = false;
              btn.textContent = "Salvar Alterações";
            }
          }
        });

        setupListener("resetBtn", "click", async () => {
          if (!confirm("Tem certeza que deseja resetar tudo? Isso apagará todas as suas personalizações.")) return;
          state = normalizeConfig(defaultConfig);
          updatePreview(state);
          const btn = document.getElementById("resetBtn");
          if (btn instanceof HTMLButtonElement) btn.disabled = true;
          try {
            if (!adminPassword) throw new Error("Sem senha");
            const { ok, status, data } = await fetchJson(`${API_BASE}/admin/save`, {
              method: "POST",
              body: JSON.stringify({ username: ADMIN_USERNAME, password: adminPassword, config: state }),
            });
            if (!ok || !data || data.ok !== true) {
              throw new Error(data?.error || `Falha ao resetar no Supabase. (status ${status})`);
            }
            appConfig = state;
            renderApp();
          } catch (err) {
            window.alert(err instanceof Error ? err.message : "Falha ao resetar no Supabase.");
          } finally {
            if (btn instanceof HTMLButtonElement) btn.disabled = false;
          }
        });
      }

      function renderApp() {
        const app = document.getElementById("app");
        ensureConfigLoaded();
        const config = appConfig;

        if (!isAdminRoute()) {
          if (!configLoaded) {
            app.innerHTML = `
              <div style="width: 100%; display: grid; place-items: center;">
                <div class="container">
                  <div class="profile">
                    <div class="loading-pokeball" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
                        <defs>
                          <radialGradient id="g" cx="40%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#ffffff" stop-opacity=".35" />
                            <stop offset="60%" stop-color="#ffffff" stop-opacity="0" />
                          </radialGradient>
                          <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#ff6b6b" />
                            <stop offset="100%" stop-color="#ef4444" />
                          </linearGradient>
                          <linearGradient id="gray" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#f8fafc" />
                            <stop offset="100%" stop-color="#e5e7eb" />
                          </linearGradient>
                        </defs>
                        <circle cx="64" cy="64" r="58" fill="url(#gray)" stroke="#000000" stroke-width="8" />
                        <path d="M6 64a58 58 0 0 1 116 0" fill="url(#red)" />
                        <rect x="6" y="60" width="116" height="8" fill="#000000" />
                        <circle cx="64" cy="64" r="18" fill="#ffffff" stroke="#000000" stroke-width="8" />
                        <circle cx="64" cy="64" r="8" fill="#cbd5e1" />
                        <circle cx="64" cy="64" r="58" fill="url(#g)" />
                      </svg>
                    </div>
                    <h1>Carregando…</h1>
                    <p>Carregando todos os meus links</p>
                  </div>
                </div>
              </div>
            `;
            return;
          }

          if (isSeriesRoute()) {
            app.innerHTML = renderSeries(config);
            return;
          }

          app.innerHTML = renderPublic(config);
          return;
        }

        if (!adminPassword) {
          app.innerHTML = renderAdminGate(config);
          attachAdminGateHandlers();
          return;
        }

        app.innerHTML = renderAdminEditor(config);
        attachAdminEditorHandlers(config);
      }

      ensureConfigLoaded();
      renderApp();
      window.addEventListener("popstate", renderApp);
    </script>
  </body>
</html>
